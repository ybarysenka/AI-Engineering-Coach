name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag version $TAG does not match package.json version $VERSION"
            exit 1
          fi

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npm run package

      - name: Capture VSIX path
        id: vsix
        run: |
          VSIX_PATH="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX package was produced"
            exit 1
          fi
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      - name: Upload VSIX artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vsix
          path: ${{ steps.vsix.outputs.path }}

